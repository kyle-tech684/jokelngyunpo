<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #FAEEE6;
        }
        #content {
            border: 1px solid transparent;
            background-color: #FFC0CB;
            border-radius: 12px;
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
        }
        #yesButton, #noButton {
            font-size: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
            padding: 15px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }
        #yesButton {
            background-color: #4CAF50; /* Green */
            color: white;
        }
        #noButton {
            background-color: #f44336; /* Red */
            color: white;
        }
        #noButton:disabled {
            background-color: #ddd;
            color: #666;
            box-shadow: none;
        }
        #yesButton:hover, #noButton:hover {
            box-shadow: 0 12px 20px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
        }

        .heart {
            position: absolute;
            top: -120px;
            width: 50px;
            height: 50px;
            pointer-events: none;
            animation: fall 4s linear infinite;
        }

        .heart svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        @keyframes fall {
            0% { transform: translateY(0); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(120vh); opacity: 0; }
        }

    </style>
</head>
<body>
    <div id="content">
        <h2 id="question">May I court you?</h2>
        <button id="yesButton">YES</button>
        <button id="noButton">NO</button>
        <p id="message"></p>
    </div>

    <script>
        var noClickCount = 0;
        document.getElementById('noButton').addEventListener('click', function() { //NOOOOO button
            noClickCount++;
            if (noClickCount == 1) {
                document.getElementById('yesButton').style.fontSize = '30px';
            } else if (noClickCount == 2) {
                this.style.fontSize = '10px';
                document.getElementById('yesButton').style.fontSize = '40px';
            } else if (noClickCount == 3) {
                document.getElementById('yesButton').style.fontSize = '90px';
                this.style.fontSize = '7px';
            } else if (noClickCount == 4) {
                this.style.position = 'absolute';
                this.style.left = Math.random() * window.innerWidth + 'px';
                this.style.top = Math.random() * window.innerHeight + 'px';
            } else if (noClickCount >= 5 && noClickCount < 10) {
                this.style.position = 'absolute';
                this.style.left = Math.random() * window.innerWidth + 'px';
                this.style.top = Math.random() * window.innerHeight + 'px';
            } else if (noClickCount >= 10 && noClickCount < 15) {
                // Avoid disabling the button
                // this.disabled = true;
                this.style.position = 'absolute';
                this.style.left = Math.random() * window.innerWidth + 'px';
                this.style.top = Math.random() * window.innerHeight + 'px';
                document.getElementById('message').innerText = 'Are you sure?';
                document.getElementById('message').style.position = 'absolute';
                document.getElementById('message').style.left = this.style.left;
                document.getElementById('message').style.top = parseFloat(this.style.top) + 50 + 'px';
            } else if (noClickCount == 15) {
                document.getElementById('message').innerText = 'Oh No! You broke the button :c';
                this.disabled = true;
                this.style.color = grey;
                document.getElementById('message').innerText = 'Oh No! You broke the button :c';
            }
        });

        document.getElementById('yesButton').addEventListener('click', function() {                 //YESSSS button
            document.getElementById('question').innerText = 'Haha joke lng po <3';
            for (var i = 0; i < 100; i++) {
                var heart = document.createElement('div');
                heart.className = 'heart';
                heart.style.left = Math.random() * (window.innerWidth - 50) + 'px';
                heart.style.animationDuration = Math.random() * 2 + 3 + 's'; // between 3 and 5 secs
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29.6"><path fill="#FF0000" d="M23.6,0C20.1,0,16.7,1.9,16,5.2C15.3,1.9,11.9,0,8.4,0C3.8,0,0,3.8,0,8.4c0,4.9,3.6,9,10.8,15.8c3.5,3.2,6.3,5,6.3,5s2.8-1.8,6.3-5C28.4,17.4,32,13.3,32,8.4C32,3.8,28.2,0,23.6,0z"/></svg>';
                document.body.appendChild(heart);
            }
            document.getElementById('yesButton').style.display = 'none';
            document.getElementById('noButton').style.display = 'none';
        });
    </script>
</body>
</html>
